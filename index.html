<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আলটিমেট ক্যাসিনো প্রো</title>
    <style>
        :root { --gold: #f1c40f; --dark: #121212; --card: #1e1e1e; }
        body { font-family: 'Arial', sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 10px; }
        .container { max-width: 450px; margin: auto; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        
        .header { background: linear-gradient(45deg, #f1c40f, #d4af37); color: black; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; }
        .balance-box { font-size: 24px; color: var(--gold); margin: 10px 0; }
        
        /* গেম সেকশন */
        .game-card { background: #262626; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-bottom: 3px solid var(--gold); }
        .slot-display { display: flex; justify-content: center; gap: 10px; margin: 10px 0; font-size: 40px; background: #000; padding: 15px; border-radius: 10px; }
        
        /* ইনপুট ও বাটন */
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; text-align: center; font-size: 16px; }
        button { width: 90%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px 0; }
        
        .hidden { display: none; }
        .timer { color: #e74c3c; font-size: 18px; font-weight: bold; }
        .spinning { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="auth-screen" class="container">
    <div class="header">🔐 ক্যাসিনো সাইন-আপ</div>
    <input type="email" id="email" placeholder="আপনার জিমেইল দিন">
    <button onclick="requestOTP()">ওটিপি পাঠান</button>
    
    <div id="otp-area" class="hidden">
        <p style="color: #2ecc71;">আপনার জিমেইলে ওটিপি পাঠানো হয়েছে!</p>
        <input type="text" id="otp-input" placeholder="ওটিপি কোড দিন">
        <button onclick="verifyAndLogin()">লগইন করুন</button>
    </div>
</div>

<div id="main-screen" class="container hidden">
    <div class="header">🎰 স্বাগতম ড্যাশবোর্ডে</div>
    <div class="balance-box">💰 ব্যালেন্স: <span id="balance">1000</span> BDT</div>

    <div class="game-card">
        <h3>🎰 লাকি স্লট</h3>
        <div class="slot-display" id="slots">❓ ❓ ❓</div>
        <input type="number" id="slot-bet" placeholder="বাজির পরিমাণ" value="100">
        <button onclick="playSlots()">স্পিন করুন</button>
    </div>

    <div class="game-card">
        <h3>🐔 মুরগি দৌড় (Chicken Run)</h3>
        <div id="chicken-status" style="font-size: 30px;">🏁 🐔</div>
        <input type="number" id="chicken-bet" placeholder="বাজির পরিমাণ" value="50">
        <button onclick="playChicken()" style="background: #2ecc71; color: white;">মুরগি দৌড়ান</button>
    </div>

    <button onclick="showCashIn()" style="background: #3498db; color: white;">💳 ক্যাশ ইন করুন</button>
</div>

<div id="cashin-screen" class="container hidden">
    <div class="header">💳 ক্যাশ ইন প্রসেস</div>
    <p>অ্যাডমিন বিকাশ: <b>01788XXXXXX</b></p>
    <div class="timer" id="timer">সময় বাকি: 04:00</div>
    <input type="number" id="ci-amount" placeholder="কত টাকা পাঠিয়েছেন?">
    <input type="text" id="ci-trx" placeholder="TrxID (ট্রানজেকশন আইডি)">
    <button onclick="confirmCashIn()">কনফার্ম পেমেন্ট</button>
    <button onclick="backToMain()" style="background: #e74c3c; color: white;">বাতিল</button>
</div>

<script>
    let balance = 1000;
    let correctOTP = "";

    function requestOTP() {
        const email = document.getElementById('email').value;
        if(email.includes("@")) {
            correctOTP = Math.floor(1000 + Math.random() * 9000).toString();
            alert("সিস্টেম আপডেট: আপনার জিমেইলে ওটিপি পাঠানো হয়েছে!\nকোডটি হলো: " + correctOTP);
            document.getElementById('otp-area').classList.remove('hidden');
        } else { alert("সঠিক ইমেইল দিন!"); }
    }

    function verifyAndLogin() {
        const input = document.getElementById('otp-input').value;
        if(input === correctOTP) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        } else { alert("ভুল ওটিপি!"); }
    }

    function playSlots() {
        let bet = parseInt(document.getElementById('slot-bet').value);
        if(bet > balance) return alert("টাকা নেই!");
        balance -= bet;
        updateUI();
        
        const slots = document.getElementById('slots');
        slots.classList.add('spinning');
        
        setTimeout(() => {
            slots.classList.remove('spinning');
            const items = ["🍒", "💎", "7️⃣", "⭐"];
            const r1 = items[Math.floor(Math.random()*4)];
            const r2 = items[Math.floor(Math.random()*4)];
            const r3 = items[Math.floor(Math.random()*4)];
            slots.innerText = `${r1} ${r2} ${r3}`;
            
            if(r1 === r2 && r2 === r3) {
                balance += bet * 10;
                alert("জ্যাকপট! ১০ গুণ জয়!");
            } else if(r1 === r2 || r2 === r3) {
                balance += bet * 2;
                alert("২ গুণ জয়!");
            }
            updateUI();
        }, 1000);
    }

    function playChicken() {
        let bet = parseInt(document.getElementById('chicken-bet').value);
        if(bet > balance) return alert("টাকা নেই!");
        balance -= bet;
        updateUI();
        
        const status = document.getElementById('chicken-status');
        status.innerText = "🏃‍♂️ 🐔 .... 🦊";
        
        setTimeout(() => {
            if(Math.random() > 0.5) {
                balance += bet * 2;
                status.innerText = "🏁 🐔 (মুরগি জিতে গেছে!)";
                alert("আপনি জিতেছেন!");
            } else {
                status.innerText = "💀 🦊 (শেয়াল ধরে ফেলেছে!)";
                alert("হারলেন!");
            }
            updateUI();
        }, 1500);
    }

    function showCashIn() {
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('cashin-screen').classList.remove('hidden');
        let time = 240;
        const timerLabel = document.getElementById('timer');
        const interval = setInterval(() => {
            let min = Math.floor(time / 60);
            let sec = time % 60;
            timerLabel.innerText = `সময় বাকি: 0${min}:${sec < 10 ? '0'+sec : sec}`;
            if(time <= 0) clearInterval(interval);
            time--;
        }, 1000);
    }

    function confirmCashIn() {
        const amt = parseInt(document.getElementById('ci-amount').value);
        const trx = document.getElementById('ci-trx').value;
        if(amt > 0 && trx.length > 5) {
            alert("ভেরিফাই হচ্ছে... ২ মিনিট অপেক্ষা করুন।");
            setTimeout(() => {
                balance += amt;
                updateUI();
                alert("টাকা যোগ হয়েছে!");
                backToMain();
            }, 3000);
        }
    }

    function backToMain() {
        document.getElementById('cashin-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
    }
</script>
</body>
</html>
